server {
    listen 80;
    server_name web-app-backend.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name web-app-backend.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/web-app-backend.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web-app-backend.duckdns.org/privkey.pem;

    location /api/ {
        # Note: 'backend-api' matches the service name in docker-compose
        proxy_pass http://backend-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://backend-api:5000;
        proxy_set_header Host $host;
    }
}