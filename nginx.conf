worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log settings
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Optimization
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name web-app-backend.duckdns.org;

        # Health check for the GCP Load Balancer (so it sees the VM as 'Healthy')
        location /health {
            return 200 'healthy';
            add_header Content-Type text/plain;
        }

        # The main API proxy
        location /api {
            proxy_pass http://backend-api:5000;
            
            # Forwarding headers so Node.js knows the real client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 🔥 CRUCIAL: Tells Node.js the original request was HTTPS 
            # This allows the 'Secure' login cookies to work for your Web app.
            proxy_set_header X-Forwarded-Proto https;

            # Proxy timeouts (prevents 504 errors on long requests)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Fallback for anything else
        location / {
            return 404;
        }
    }
}